# Build en CI y deploy a Vercel (requiere VERCEL_TOKEN en GitHub Secrets).
# NO usar deploy hook solo: sin Git conectado en Vercel genera deploy vacío → 404.
name: Deploy to Vercel (prov)
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_Ku9TorGrXCybLMQ8aYsGujdf
      VERCEL_PROJECT_ID: prj_p5ArLTR43TKeYVxNtrNBd3RDEXRW
      EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: 85359766939-cjebsrg7s5s48sumoh3gio83jf5tskj9.apps.googleusercontent.com
      EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID: 85359766939-vod9ceeb0fj4p8c7pvmp31flk0ai56fm.apps.googleusercontent.com
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web (expo export)
        run: npx expo export --platform web

      - name: Verify build output
        run: test -f dist/index.html

      - name: Deploy to Vercel production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::VERCEL_TOKEN no está en GitHub Secrets."
            echo "Crea un token en https://vercel.com/account/settings/tokens"
            echo "y añádelo en Settings → Secrets → Actions → VERCEL_TOKEN"
            exit 1
          fi
          npx vercel@53.2.0 deploy --prod --yes --token "$VERCEL_TOKEN"
